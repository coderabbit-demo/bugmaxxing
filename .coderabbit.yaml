language: en-US

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "api/src/auth/utils/generate-callback-url.ts"
      instructions: |
        Review for Host header injection: verify the callback URL is constructed
        from a trusted source (e.g. PUBLIC_URL env var) rather than directly from
        request headers (Host, X-Forwarded-Host, X-Forwarded-Proto). Check whether
        the server requires explicit trust-proxy configuration for this to be safe.
        Verify there is allowlisting or validation of acceptable origins before use.

    - path: "api/src/auth/utils/is-login-redirect-allowed.ts"
      instructions: |
        The function signature changed to add an `originUrl` parameter. Audit ALL
        callers across the codebase (not just files in this PR) to confirm they pass
        the correct arguments in the new parameter order. Check that `originUrl`
        cannot be set from an untrusted request header. Verify the new validation
        logic does not regress valid redirects that previously worked when PUBLIC_URL
        differs from request origin. Test edge cases: protocol-relative URLs, double
        slashes, Unicode homoglyphs.

    - path: "api/src/auth/drivers/oauth2.ts"
      instructions: |
        The PR removes `redirect_uris` from the OAuth client configuration and
        passes callback URL dynamically. Check: (1) whether the OAuth provider
        library requires `redirect_uris` at init time — omitting it may break token
        exchange with strict providers; (2) whether `callbackUrl` stored in the JWT
        can be manipulated by an attacker to redirect tokens; (3) that the PKCE
        code verifier flow is intact with the new dynamic callback URL; (4) the
        final redirect in the callback handler re-validates the redirect URL.

    - path: "api/src/auth/drivers/openid.ts"
      instructions: |
        `generateAuthUrl` is now async. Verify every caller properly awaits it.
        The `redirect_uris` removal violates OpenID Connect Core spec Section 3.1.2.1
        which requires redirect_uri validation against pre-registered URIs — flag this.
        Check whether issuer discovery could be exploited to bypass redirect_uri
        enforcement. Verify `callbackUrl` in the JWT payload is validated on receipt.

    - path: "api/src/auth/drivers/saml.ts"
      instructions: |
        Check that the SAML driver was updated to match any signature changes in
        `isLoginRedirectAllowed`. Redirect validation must be consistent with the
        OAuth2 and OpenID drivers.

    - path: "api/src/auth/**"
      instructions: |
        Security audit: (1) Search for any remaining callers of the OLD
        `isLoginRedirectAllowed` signature that were not updated in this PR;
        (2) Verify that Express `trust proxy` is documented as a prerequisite for
        the forwarded-host feature to work securely — without it, Host header
        injection is trivial; (3) Flag any code paths where a user-controlled value
        reaches URL construction without sanitization; (4) Check for missing `await`
        on the newly-async `generateAuthUrl`.

    - path: "app/vite.config.js"
      instructions: |
        `changeOrigin: true` was removed from the proxy config. Explain the security
        impact on Origin header handling and whether this breaks CORS or CSRF
        protection in development or production proxy setups.

knowledge_base:
  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local

tools:
  semgrep:
    enabled: true
