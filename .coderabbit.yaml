reviews:
  profile: assertive
  path_instructions:
    - path: "api/src/auth/**"
      instructions: |
        Focus on auth/security correctness. Flag Host or X-Forwarded-Host trust, redirect_uri or callback origin confusion, open redirects, SSRF, CSRF/state/nonce/PKCE bugs, auth bypass, privilege escalation, allowlist/domain-matching mistakes, proxy/base-url regressions, insecure cookie or JWT handling, and logging of secrets, tokens, or session data. Prefer concrete inline findings with exploit or regression reasoning.
    - path: "api/src/auth/**/*.test.ts"
      instructions: |
        Check negative-path coverage, malformed callback or session data, cross-origin redirect cases, proxy spoofing, token leakage, and mock isolation/reset correctness.
    - path: "app/vite.config.js"
      instructions: |
        Focus on proxy-origin, cookie, CORS, websocket, and dev/prod parity risks that can break auth flows or hide callback bugs.